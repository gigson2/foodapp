<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#060118">
        <title>Offline | Dri Africain Traditional Grill</title>
        <style>
            :root {
                color-scheme: dark;
                font-family: Outfit, system-ui, sans-serif;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background:
                    radial-gradient(circle at top left, rgba(255, 51, 51, 0.24), transparent 30%),
                    radial-gradient(circle at 82% 18%, rgba(151, 245, 10, 0.18), transparent 20%),
                    linear-gradient(180deg, #060118 0%, #0c0231 100%);
                color: #ede6fe;
            }

            .card {
                width: min(92vw, 34rem);
                border-radius: 2rem;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: rgba(255, 255, 255, 0.08);
                box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
                backdrop-filter: blur(20px);
                padding: 2rem;
            }

            h1 {
                margin: 0 0 0.75rem;
                font-size: clamp(2.25rem, 6vw, 3.4rem);
                line-height: 1;
            }

            p {
                margin: 0 0 1rem;
                color: rgba(237, 230, 254, 0.78);
                line-height: 1.75;
            }

            a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 999px;
                padding: 0.9rem 1.35rem;
                background: #ff0000;
                color: white;
                text-decoration: none;
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <main class="card">
            <p style="text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.75rem;">Offline mode</p>
            <h1>You are offline.</h1>
            <p>Please reconnect to place or track orders.</p>
            <p>Dri Africain Traditional Grill LLC serves pickup-only grilled chicken and goat from Papillion, Nebraska.</p>
            <a href="/">Try again</a>
        </main>
    </body>
</html>
